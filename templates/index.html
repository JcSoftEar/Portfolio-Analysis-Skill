<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 持仓看盘系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --profit-color: #e74c3c;
            --loss-color: #2ecc71;
            --warning-color: #f39c12;
        }
        
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }
        
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 1rem;
        }
        
        .profit {
            color: var(--profit-color) !important;
            font-weight: bold;
        }
        
        .loss {
            color: var(--loss-color) !important;
            font-weight: bold;
        }
        
        .table th {
            background-color: #f8f9fa;
            font-weight: 600;
            border-top: none;
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .summary-item:last-child {
            border-bottom: none;
        }
        
        .summary-label {
            color: #666;
            font-size: 0.95rem;
        }
        
        .summary-value {
            font-weight: bold;
            font-size: 1.15rem;
        }
        
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .status-profit {
            background-color: rgba(46, 204, 113, 0.15);
            color: var(--profit-color);
        }
        
        .status-loss {
            background-color: rgba(231, 76, 60, 0.15);
            color: var(--loss-color);
        }
        
        .log-item {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
        }
        
        .log-item:last-child {
            border-bottom: none;
        }
        
        .btn-group-sm .btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.85rem;
        }
        
        .refresh-spinner {
            display: none;
        }
        
        .refresh-spinner.active {
            display: inline-block;
        }
        
        @media (max-width: 768px) {
            .summary-value {
                font-size: 1rem;
            }
            
            .table-responsive {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-graph-up me-2"></i>
                持仓看盘系统
            </a>
            
            <div class="d-flex align-items-center">
                <span class="text-light me-3 small" id="lastUpdated">
                    <i class="bi bi-clock me-1"></i>
                    加载中...
                </span>
                <button class="btn btn-light btn-sm me-2" onclick="loadData()" title="刷新">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
                <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#addModal" title="新增持仓">
                    <i class="bi bi-plus-circle"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- 主内容区 -->
    <div class="container-fluid mt-3">
        <div class="row">
            <!-- 左侧总览 -->
            <div class="col-lg-4 col-md-5">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-pie-chart me-2"></i>持仓总览</span>
                        <button class="btn btn-sm btn-outline-primary" onclick="updatePrices()">
                            <i class="bi bi-arrow-clockwise me-1"></i>更新价格
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div id="summaryContainer">
                            <div class="text-center p-4">
                                <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                                加载中...
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 操作记录 -->
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-clock-history me-2"></i>最近操作
                    </div>
                    <div class="card-body p-0" style="max-height: 300px; overflow-y: auto;">
                        <div id="logsContainer">
                            <div class="text-center p-4">
                                <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                                加载中...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧持仓列表 -->
            <div class="col-lg-8 col-md-7">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-list me-2"></i>持仓列表</span>
                        <div class="input-group input-group-sm" style="width: 250px;">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" placeholder="搜索股票..." id="searchInput" onkeyup="filterHoldings()">
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th onclick="sortTable(0)" id="th-name">股票名称 <i class="bi bi-sort"></i></th>
                                        <th onclick="sortTable(1)" id="th-symbol">代码 <i class="bi bi-sort"></i></th>
                                        <th>持仓</th>
                                        <th>成本价</th>
                                        <th>当前价</th>
                                        <th onclick="sortTable(5)" id="th-market">市值 <i class="bi bi-sort"></i></th>
                                        <th onclick="sortTable(6)" id="th-pnl">盈亏额 <i class="bi bi-sort"></i></th>
                                        <th onclick="sortTable(7)" id="th-pnl-percent">盈亏% <i class="bi bi-sort"></i></th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="holdingsBody">
                                    <tr>
                                        <td colspan="8" class="text-center p-4">
                                            <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                                            加载持仓数据...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 新增持仓模态框 -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>新增持仓记录</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addForm">
                        <div class="mb-3">
                            <label class="form-label">股票代码</label>
                            <input type="text" class="form-control" id="addSymbol" required>
                            <small class="form-text text-muted">例如：600519（贵州茅台）</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">股票名称（可选）</label>
                            <input type="text" class="form-control" id="addName">
                            <small class="form-text text-muted">不填则自动获取</small>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">持仓数量</label>
                                <input type="number" class="form-control" id="addQuantity" required min="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">成本价（元）</label>
                                <input type="number" class="form-control" id="addCostPrice" required step="0.0001" min="0">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="addHolding()">
                        <i class="bi bi-check-circle me-1"></i>确认添加
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 编辑持仓模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>编辑持仓记录</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <div class="mb-3">
                            <label class="form-label">股票代码</label>
                            <input type="text" class="form-control" id="editSymbol" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">股票名称</label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">持仓数量</label>
                            <input type="number" class="form-control" id="editQuantity" required min="1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">成本价（元）</label>
                            <input type="number" class="form-control" id="editCostPrice" required step="0.0001" min="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="submitEdit()">
                        <i class="bi bi-check-circle me-1"></i>确认修改
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 删除确认模态框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle me-2"></i>确认删除</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>确定要删除持仓 <strong id="deleteStockName"></strong> 吗？</p>
                    <p class="text-danger"><i class="bi bi-exclamation-circle me-1"></i>此操作不可恢复！</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">
                        <i class="bi bi-trash me-1"></i>确认删除
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 股票详情模态框 -->
    <div class="modal fade" id="stockDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white py-2">
                    <h6 class="modal-title"><i class="bi bi-graph-up-arrow me-2"></i><span id="detailStockName"></span> (<span id="detailStockSymbol"></span>)</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label class="form-label fw-bold small">今日分时图</label>
                                <div class="text-center" id="detailChartContainer" style="height: 250px;">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">加载中...</span>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">当前价格</small>
                                        <div class="fs-5 fw-bold" id="detailCurrentPrice">-</div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">涨跌额</small>
                                        <div class="fs-6" id="detailChange">-</div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">涨跌幅</small>
                                        <div class="fs-6" id="detailChangePercent">-</div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">今开</small>
                                        <div class="fs-6" id="detailOpen">-</div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">最高</small>
                                        <div class="fs-6 text-danger" id="detailHigh">-</div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">最低</small>
                                        <div class="fs-6 text-success" id="detailLow">-</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-light">
                                <div class="card-body p-3">
                                    <h6 class="card-title mb-3 fw-bold"><i class="bi bi-info-circle me-1"></i>当前分析</h6>
                                    <div id="detailAnalysis">
                                        <small class="text-muted">加载中...</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer py-2">
                    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let currentEditSymbol = '';
        let currentDeleteSymbol = '';
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            loadLogs();
            setInterval(loadData, 30000); // 每30秒自动刷新
        });
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();
                
                if (data.status === 'success') {
                    updateSummary(data.summary);
                    
                    // 检查是否有排序状态
                    if (sortColumn !== -1) {
                        // 有排序状态，使用排序后的数据
                        loadDataWithSort();
                    } else {
                        // 没有排序状态，直接显示原始数据
                        updateHoldingsTable(data.holdings);
                        updateSortIcons();
                    }
                } else {
                    alert('❌ 加载数据失败: ' + data.error);
                }
            } catch (error) {
                alert('❌ 网络错误: ' + error.message);
            }
        }
        
        // 更新总览
        function updateSummary(summary) {
            const now = new Date();
            document.getElementById('lastUpdated').innerHTML = 
                `<i class="bi bi-clock me-1"></i>更新: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            const container = document.getElementById('summaryContainer');
            container.innerHTML = `
                <div class="summary-item">
                    <span class="summary-label"><i class="bi bi-collection me-2"></i>持仓数量</span>
                    <span class="summary-value">${summary.holding_count} 只</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label"><i class="bi bi-cash-stack me-2"></i>总市值</span>
                    <span class="summary-value">¥${formatNumber(summary.total_value)}</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label"><i class="bi bi-wallet2 me-2"></i>总成本</span>
                    <span class="summary-value">¥${formatNumber(summary.total_cost)}</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label"><i class="bi bi-graph-up-arrow me-2"></i>总盈亏</span>
                    <span class="summary-value ${summary.total_pnl >= 0 ? 'profit' : 'loss'}">
                        ¥${formatNumber(summary.total_pnl)} (${summary.total_pnl_percent.toFixed(4)}%)
                    </span>
                </div>
            `;
        }
        
        // 更新持仓表格
        function updateHoldingsTable(holdings) {
            const tbody = document.getElementById('holdingsBody');
            
            if (holdings.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="text-center py-4 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            暂无持仓记录
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            holdings.forEach(holding => {
                const pnlClass = holding.pnl >= 0 ? 'profit' : 'loss';
                const statusClass = holding.pnl >= 0 ? 'status-profit' : 'status-loss';
                const statusText = holding.pnl >= 0 ? '盈利' : '亏损';
                const marketValue = holding.quantity * holding.current_price;
                
                html += `
                    <tr ondblclick="showStockDetail('${holding.symbol}', '${holding.name}')">
                        <td>
                            <span class="${statusClass} status-badge me-2">${statusText}</span>
                            ${holding.name}
                        </td>
                        <td>${holding.symbol}</td>
                        <td>${formatNumber(holding.quantity)}</td>
                        <td>¥${holding.cost_price.toFixed(4)}</td>
                        <td>¥${holding.current_price.toFixed(4)}</td>
                        <td>¥${formatNumber(marketValue)}</td>
                        <td class="${pnlClass}">¥${formatNumber(holding.pnl)}</td>
                        <td class="${pnlClass}">${holding.pnl_percent.toFixed(4)}%</td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-primary" onclick="showEditModal('${holding.symbol}', '${holding.name}')">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-outline-danger" onclick="showDeleteModal('${holding.symbol}', '${holding.name}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // 加载操作记录
        async function loadLogs() {
            try {
                const response = await fetch('/api/portfolio/logs');
                const data = await response.json();
                
                if (data.status === 'success') {
                    updateLogs(data.logs);
                }
            } catch (error) {
                console.error('加载日志失败:', error);
            }
        }
        
        // 更新操作记录
        function updateLogs(logs) {
            const container = document.getElementById('logsContainer');
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="p-3 text-muted text-center">暂无操作记录</div>';
                return;
            }
            
            let html = '';
            logs.slice(0, 10).forEach(log => {
                const time = new Date(log.timestamp).toLocaleTimeString('zh-CN', { hour12: false });
                html += `
                    <div class="log-item">
                        <div class="d-flex justify-content-between mb-1">
                            <small class="text-muted"><i class="bi bi-clock me-1"></i>${time}</small>
                            <small class="text-muted">${log.symbol}</small>
                        </div>
                        <div>${log.details}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 显示编辑模态框
        function showEditModal(symbol, name) {
            currentEditSymbol = symbol;
            document.getElementById('editSymbol').value = symbol;
            document.getElementById('editName').value = name;
            
            // 获取持仓详情并填充表单
            fetch('/api/portfolio')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const holding = data.holdings.find(h => h.symbol === symbol);
                        if (holding) {
                            document.getElementById('editQuantity').value = holding.quantity;
                            document.getElementById('editCostPrice').value = holding.cost_price;
                        }
                    }
                });
            
            const modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
        }
        
        // 提交编辑
        async function submitEdit() {
            const oldSymbol = currentEditSymbol;
            const newSymbol = document.getElementById('editSymbol').value;
            const newName = document.getElementById('editName').value;
            const quantity = document.getElementById('editQuantity').value;
            const costPrice = document.getElementById('editCostPrice').value;
            
            if (!newSymbol || !newName || !quantity || !costPrice) {
                alert('请填写完整信息');
                return;
            }
            
            try {
                const response = await fetch(`/api/portfolio/edit-multiple/${oldSymbol}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbol: newSymbol,
                        name: newName,
                        quantity: parseInt(quantity),
                        cost_price: parseFloat(costPrice)
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert('✅ 编辑成功');
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    loadData();
                    loadLogs();
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (error) {
                alert('❌ 编辑失败: ' + error.message);
            }
        }
        
        // 显示删除模态框
        function showDeleteModal(symbol, name) {
            currentDeleteSymbol = symbol;
            document.getElementById('deleteStockName').textContent = `${name}(${symbol})`;
            
            const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
            modal.show();
        }
        
        // 确认删除
        async function confirmDelete() {
            try {
                const response = await fetch(`/api/portfolio/delete/${currentDeleteSymbol}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert('✅ ' + data.message);
                    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                    loadData();
                    loadLogs();
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (error) {
                alert('❌ 删除失败: ' + error.message);
            }
        }
        
        // 新增持仓
        async function addHolding() {
            const symbol = document.getElementById('addSymbol').value.trim();
            const name = document.getElementById('addName').value.trim();
            const quantity = document.getElementById('addQuantity').value;
            const costPrice = document.getElementById('addCostPrice').value;
            
            if (!symbol || !quantity || !costPrice) {
                alert('请填写完整信息');
                return;
            }
            
            try {
                const response = await fetch('/api/portfolio/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbol,
                        name,
                        quantity: parseInt(quantity),
                        cost_price: parseFloat(costPrice)
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert('✅ ' + data.message);
                    bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
                    document.getElementById('addForm').reset();
                    loadData();
                    loadLogs();
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (error) {
                alert('❌ 添加失败: ' + error.message);
            }
        }
        
        // 更新价格
        async function updatePrices() {
            try {
                const response = await fetch('/api/portfolio/update', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert('✅ ' + data.message);
                    loadData();
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (error) {
                alert('❌ 更新失败: ' + error.message);
            }
        }
        
        // 过滤持仓
        function filterHoldings() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#holdingsBody tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        }
        
        // 格式化数字
        function formatNumber(num) {
            return num.toLocaleString('zh-CN', {
                minimumFractionDigits: 4,
                maximumFractionDigits: 4
            });
        }
        
        // 排序状态
        let sortColumn = -1;
        let sortDirection = 1; // 1: 升序, -1: 降序
        
        // 排序表格
        function sortTable(column) {
            // 切换排序方向
            if (sortColumn === column) {
                sortDirection *= -1;
            } else {
                sortColumn = column;
                sortDirection = 1;
            }
            
            // 更新箭头图标
            updateSortIcons();
            
            // 重新加载数据并排序
            loadDataWithSort();
        }
        
        // 更新排序箭头图标
        function updateSortIcons() {
            // 重置所有表头的图标
            document.getElementById('th-name').innerHTML = '股票名称 <i class="bi bi-sort"></i>';
            document.getElementById('th-symbol').innerHTML = '代码 <i class="bi bi-sort"></i>';
            document.getElementById('th-market').innerHTML = '市值 <i class="bi bi-sort"></i>';
            document.getElementById('th-pnl').innerHTML = '盈亏额 <i class="bi bi-sort"></i>';
            document.getElementById('th-pnl-percent').innerHTML = '盈亏% <i class="bi bi-sort"></i>';
            
            // 根据当前排序状态更新对应表头的图标
            if (sortColumn === 0) {
                document.getElementById('th-name').innerHTML = '股票名称 <i class="bi bi-sort-' + (sortDirection === 1 ? 'down' : 'up') + '"></i>';
            } else if (sortColumn === 1) {
                document.getElementById('th-symbol').innerHTML = '代码 <i class="bi bi-sort-' + (sortDirection === 1 ? 'down' : 'up') + '"></i>';
            } else if (sortColumn === 5) {
                document.getElementById('th-market').innerHTML = '市值 <i class="bi bi-sort-' + (sortDirection === 1 ? 'down' : 'up') + '"></i>';
            } else if (sortColumn === 6) {
                document.getElementById('th-pnl').innerHTML = '盈亏额 <i class="bi bi-sort-' + (sortDirection === 1 ? 'down' : 'up') + '"></i>';
            } else if (sortColumn === 7) {
                document.getElementById('th-pnl-percent').innerHTML = '盈亏% <i class="bi bi-sort-' + (sortDirection === 1 ? 'down' : 'up') + '"></i>';
            }
        }
        
        // 加载数据并排序
        async function loadDataWithSort() {
            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();
                
                if (data.status === 'success') {
                    updateSummary(data.summary);
                    
                    // 对持仓数据进行排序
                    let sortedHoldings = [...data.holdings];
                    
                    sortedHoldings.sort((a, b) => {
                        let valueA, valueB;
                        
                        switch (sortColumn) {
                            case 0: // 股票名称
                                valueA = a.name;
                                valueB = b.name;
                                break;
                            case 1: // 股票代码
                                valueA = a.symbol;
                                valueB = b.symbol;
                                break;
                            case 5: // 市值
                                valueA = a.quantity * a.current_price;
                                valueB = b.quantity * b.current_price;
                                break;
                            case 6: // 盈亏额
                                valueA = a.pnl;
                                valueB = b.pnl;
                                break;
                            case 7: // 盈亏%
                                valueA = a.pnl_percent;
                                valueB = b.pnl_percent;
                                break;
                            default:
                                return 0;
                        }
                        
                        if (typeof valueA === 'string' && typeof valueB === 'string') {
                            return valueA.localeCompare(valueB) * sortDirection;
                        } else {
                            return (valueA - valueB) * sortDirection;
                        }
                    });
                    
                    updateHoldingsTable(sortedHoldings);
                    updateSortIcons();
                } else {
                    alert('❌ 加载数据失败: ' + data.error);
                }
            } catch (error) {
                alert('❌ 网络错误: ' + error.message);
            }
        }
        
        // 全局Chart实例
        let stockChart = null;
        
        // 显示股票详情
        async function showStockDetail(symbol, name) {
            // 更新模态框标题
            document.getElementById('detailStockName').textContent = name;
            document.getElementById('detailStockSymbol').textContent = symbol;
            
            // 重置显示
            document.getElementById('detailCurrentPrice').textContent = '-';
            document.getElementById('detailChange').textContent = '-';
            document.getElementById('detailChangePercent').textContent = '-';
            document.getElementById('detailOpen').textContent = '-';
            document.getElementById('detailHigh').textContent = '-';
            document.getElementById('detailLow').textContent = '-';
            document.getElementById('detailAnalysis').innerHTML = '<small class="text-muted">加载中...</small>';
            document.getElementById('detailChartContainer').innerHTML = '<div class="spinner-border text-primary" role="status"><span class="visually-hidden">加载中...</span></div>';
            
            // 显示模态框
            const modal = new bootstrap.Modal(document.getElementById('stockDetailModal'));
            modal.show();
            
            try {
                const response = await fetch(`/api/stock/detail/${symbol}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const detail = data.data;
                    
                    // 更新价格信息
                    document.getElementById('detailCurrentPrice').textContent = `¥${detail.current.toFixed(4)}`;
                    
                    const changeText = detail.change >= 0 ? `+¥${detail.change.toFixed(4)}` : `¥${detail.change.toFixed(4)}`;
                    const changePercentText = detail.change_percent >= 0 ? `+${detail.change_percent.toFixed(4)}%` : `${detail.change_percent.toFixed(4)}%`;
                    
                    document.getElementById('detailChange').textContent = changeText;
                    document.getElementById('detailChange').className = `fs-6 ${detail.change >= 0 ? 'profit' : 'loss'}`;
                    
                    document.getElementById('detailChangePercent').textContent = changePercentText;
                    document.getElementById('detailChangePercent').className = `fs-6 ${detail.change_percent >= 0 ? 'profit' : 'loss'}`;
                    
                    document.getElementById('detailOpen').textContent = `¥${detail.open.toFixed(4)}`;
                    document.getElementById('detailHigh').textContent = `¥${detail.high.toFixed(4)}`;
                    document.getElementById('detailLow').textContent = `¥${detail.low.toFixed(4)}`;
                    
                    // 更新分析
                    updateAnalysis(detail);
                    
                    // 创建分时图
                    createMinChart(detail);
                } else {
                    document.getElementById('detailChartContainer').innerHTML = '<div class="text-muted">获取数据失败</div>';
                }
            } catch (error) {
                console.error('获取股票详情失败:', error);
                document.getElementById('detailChartContainer').innerHTML = '<div class="text-muted">网络错误</div>';
            }
        }
        
        // 更新分析
        function updateAnalysis(detail) {
            const container = document.getElementById('detailAnalysis');
            const isProfit = detail.change >= 0;
            
            let analysisHTML = `
                <div class="mb-2">
                    <small class="text-muted">走势判断</small>
                    <div class="fw-bold ${isProfit ? 'profit' : 'loss'}">${isProfit ? '📈 上涨' : '📉 下跌'}</div>
                </div>
                <div class="mb-2">
                    <small class="text-muted">波动幅度</small>
                    <div class="fw-bold">${Math.abs(detail.change_percent).toFixed(4)}%</div>
                </div>
                <div class="mb-2">
                    <small class="text-muted">相对开盘</small>
                    <div class="fw-bold ${detail.current >= detail.open ? 'profit' : 'loss'}">
                        ${detail.current >= detail.open ? '高于' : '低于'}开盘价
                    </div>
                </div>
                <div class="mb-2">
                    <small class="text-muted">日内位置</small>
                    <div class="fw-bold">
                        ${detail.current === detail.high ? '🏆 最高价' : 
                          detail.current === detail.low ? '🎯 最低价' : 
                          '中间位置'}
                    </div>
                </div>
            `;
            
            container.innerHTML = analysisHTML;
        }
        
        // 创建分时图
        function createMinChart(detail) {
            const container = document.getElementById('detailChartContainer');
            
            // 清理旧的Chart
            if (stockChart) {
                stockChart.destroy();
            }
            
            // 创建canvas
            container.innerHTML = '<canvas id="minChart"></canvas>';
            const ctx = document.getElementById('minChart').getContext('2d');
            
            // 使用真实数据或生成示例数据
            let times = ['09:30', '10:00', '10:30', '11:00', '11:30', '13:00', '13:30', '14:00', '14:30', '15:00'];
            let prices = [];
            const basePrice = detail.pre_close || detail.current;
            const openPrice = detail.open || basePrice;
            
            // 尝试使用API返回的真实数据
            if (detail.min_data && detail.min_data.times && detail.min_data.times.length > 0) {
                times = detail.min_data.times;
                prices = detail.min_data.prices;
            } else {
                // 如果没有真实数据，生成示例数据
                for (let i = 0; i < times.length; i++) {
                    const randomChange = (Math.random() - 0.5) * 0.02 * basePrice;
                    prices.push(basePrice + randomChange);
                }
            }
            
            const chartColor = detail.change >= 0 ? '#e74c3c' : '#2ecc71';
            
            stockChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: times,
                    datasets: [{
                        label: '价格',
                        data: prices,
                        borderColor: chartColor,
                        backgroundColor: chartColor + '20',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(0,0,0,0.1)'
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'openPriceLine',
                    beforeDraw: (chart) => {
                        const { ctx, chartArea } = chart;
                        if (!chartArea) return;
                        
                        const scale = chart.scales.y;
                        const y = scale.getPixelForValue(openPrice);
                        
                        ctx.save();
                        ctx.beginPath();
                        ctx.moveTo(chartArea.left, y);
                        ctx.lineTo(chartArea.right, y);
                        ctx.strokeStyle = '#f39c12';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.stroke();
                        ctx.restore();
                        
                        // 标注开盘价
                        ctx.save();
                        ctx.fillStyle = '#f39c12';
                        ctx.font = '12px sans-serif';
                        ctx.fillText(`开:¥${openPrice.toFixed(2)}`, chartArea.left + 5, y - 5);
                        ctx.restore();
                    }
                }]
            });
        }
    </script>
</body>
